server.port=6666
spring.cloud.discovery.enabled=true
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.routes[0].id=etudiant-service
spring.cloud.gateway.routes[0].uri=lb://ETUDIANT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/etudiants/**
spring.cloud.gateway.routes[1].id=enseignant-service
spring.cloud.gateway.routes[1].uri=lb://ENSEIGNANT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/enseignants/**
spring.cloud.gateway.routes[2].id=stage-service
spring.cloud.gateway.routes[2].uri=lb://STAGE-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/stages/**
spring.cloud.gateway.routes[3].id=scolarite-service
spring.cloud.gateway.routes[3].uri=lb://SCOLARITE-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/scolarites/**
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
management.endpoints.web.exposure.include=*
